# Render Blueprint — backend API (free tier)
# Mock provider works without API keys. SQLite uses DATA_DIR (ephemeral on free tier).

services:
  - type: web
    name: guardrail-gateway-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python scripts/train_sklearn_classifier.py && python scripts/warm_ml_model.py
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_ORIGINS
        value: https://guardrail-gateway.vercel.app
      - key: DATA_DIR
        value: /tmp/guardrail-data
      - key: DEFAULT_PROVIDER
        value: auto
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ML_GUARD_ENABLED
        value: "true"
      - key: ML_GUARD_BACKEND
        value: "auto"
      - key: ML_GUARD_MODEL
        value: "fmops/distilbert-prompt-injection"