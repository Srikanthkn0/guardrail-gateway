# Render Blueprint - backend API (deploy revision 2026-06-28)
# Set XAI_API_KEY or GROK_API_KEY for Grok chat + prompt scanning.
# Set API_KEY and the same value as VITE_GATEWAY_API_KEY on Vercel for auth.

services:
  - type: web
    name: guardrail-gateway-api
    runtime: python
    plan: free
    rootDir: backend
    healthCheckPath: /health/live
    buildCommand: pip install -r requirements-render.txt && python scripts/train_sklearn_classifier.py
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --graceful-timeout 30
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_ORIGINS
        value: https://guardrail-gateway.vercel.app
      - key: DATA_DIR
        value: /tmp/guardrail-data
      - key: DEFAULT_PROVIDER
        value: auto
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: REQUIRE_API_KEY
        value: "false"
      - key: ML_GUARD_GROK_MODEL
        value: grok-3-mini
      - key: ML_GUARD_ENABLED
        value: "true"
      - key: ML_GUARD_BACKEND
        value: sklearn
      - key: ML_GUARD_MODEL
        value: fmops/distilbert-prompt-injection
      - key: RATE_LIMIT_CHAT_PER_MIN
        value: "30"
      - key: STORE_FULL_LOG_CONTENT
        value: "false"